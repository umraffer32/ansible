---
- name: Restart all Ubuntu machines
  hosts: workers
  gather_facts: false
  become: yes
  tasks:
    - name: ====== Reboot the system ======
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible"
        reboot_timeout: 35
        pre_reboot_delay: 5
        post_reboot_delay: 5
        test_command: whoami
