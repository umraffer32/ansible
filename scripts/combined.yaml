---
- name: Collect SSH host keys for every target
  hosts: localhost
  gather_facts: false

  vars:
    target_hosts: "{{ groups['workers'] }}"

  tasks:
    - name: ====== Scan and add worker SSH keys to known_hosts ======
      ansible.builtin.shell: "ssh-keyscan -T 2 {{ item }} >> ~/.ssh/known_hosts 2>/dev/null || true"
      loop: "{{ target_hosts }}"
      changed_when: false

- name: Configure all worker nodes
  hosts: workers
  become: true
  vars_files:
    - group_vars/workers/vault.yml   # tailscale auth key lives here

  # gather_facts is enabled by default, ensuring it happens exactly once

  tasks:
    - name: ====== UPDATE & UPGRADE ======
      ansible.builtin.apt:
        update_cache: yes
        upgrade: yes
        autoremove: yes
        autoclean: yes

    - name: ====== Installing unattended-upgrades ======
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - htop
          - traceroute
          - curl
          - gnupg
        state: present

    - name: ====== Configuring unattended-upgrades ======
      ansible.builtin.copy:
        src: ~/ansible/files/50unattended-upgrades
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: "0644"
        backup: yes

    - name: ====== Restarting service ======
      ansible.builtin.systemd:
        name: unattended-upgrades
        state: restarted

    - name: ====== Install prerequisite packages ======
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg-agent
          - software-properties-common
        state: present
        update_cache: yes

    - name: ====== Add Docker's official GPG key ======
      ansible.builtin.shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/docker-archive-keyring.gpg

    - name: ====== Add Docker repository ======
      ansible.builtin.shell: |
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
      args:
        creates: /etc/apt/sources.list.d/docker.list

    - name: ====== Install Docker Engine and Docker Compose ======
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: ====== Enable and start Docker service ======
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: ====== Install QEMU Guest Agent ======
      ansible.builtin.apt:
        name: qemu-guest-agent
        state: present
        update_cache: yes

    - name: ====== Enable and start QEMU Guest Agent service ======
      ansible.builtin.systemd:
        name: qemu-guest-agent
        enabled: true
        state: started

    - name: ====== Add Tailscale GPG key ======
      ansible.builtin.shell: |
        curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/$(lsb_release -cs).gpg \
        | gpg --dearmor -o /usr/share/keyrings/tailscale-archive-keyring.gpg
      args:
        creates: /usr/share/keyrings/tailscale-archive-keyring.gpg

    - name: ====== Add Tailscale repository ======
      ansible.builtin.shell: |
        echo "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] \
        https://pkgs.tailscale.com/stable/ubuntu $(lsb_release -cs) main" \
        > /etc/apt/sources.list.d/tailscale.list
      args:
        creates: /etc/apt/sources.list.d/tailscale.list

    - name: ====== Install Tailscale ======
      ansible.builtin.apt:
        name: tailscale
        state: present
        update_cache: yes

    - name: ====== Enable and start Tailscale ======
      ansible.builtin.systemd:
        name: tailscaled
        enabled: true
        state: started

    - name: ====== Bring Tailscale up with auth key ======
      ansible.builtin.command: >
        tailscale up
        --authkey={{ tailscale_authkey }}
        --accept-dns=false

    - name: ====== Check Tailscale status ======
      ansible.builtin.command: tailscale status
      register: tailscale_status
      changed_when: false
      failed_when: false

    - name: ====== Reboot the system ======
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible"
        reboot_timeout: 30
        pre_reboot_delay: 2
        post_reboot_delay: 2
        test_command: whoami
