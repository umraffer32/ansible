---
- name: Update AWS instances
  hosts: AWS
  gather_facts: no
  become: yes
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        
    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist   

    - name: Update locales
      ansible.builtin.apt:
        name: locales-all
        state: present    